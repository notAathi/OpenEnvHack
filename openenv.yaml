name: executive-conflict-resolution-env
version: "2.0.0"
description: >
  An executive assistant environment where an agent must resolve real workplace conflicts:
  scheduling clashes, deadline crises, delegation decisions, and social obligations.
  Each episode generates a fresh dynamic inbox of 5 conflict items with randomized
  participants, times, and stakes. Agents must identify conflict type, choose the right
  resolution strategy, and draft the actual message to execute it.
tags:
  - openenv
  - conflict-resolution
  - personalized-tasks
  - long-horizon
  - real-world
tasks:
  - id: easy
    name: Conflict Classification
    description: Identify the type of each conflict (scheduling, deadline, delegation, social)
    difficulty: easy
  - id: medium
    name: Conflict Resolution Strategy
    description: Classify conflict AND choose the correct resolution action
    difficulty: medium
  - id: hard
    name: Full Conflict Resolution
    description: Classify, choose resolution, AND draft the message to execute it
    difficulty: hard
observation_space:
  type: object
  description: Dynamic conflict items with title, description, participants, urgency, and executive context
action_space:
  type: object
  description: Conflict type classification, resolution strategy, and optional message draft
reward_range: [0.0, 1.0]
